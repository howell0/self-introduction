<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>商品紹介ページ</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f8f8f8;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 20px;
    }
    .product-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 24px;
    }
    .price {
      color: #e60023;
      font-size: 22px;
      margin: 10px 0;
    }
    .btn {
      display: block;
      background: #e60023;
      color: #fff;
      text-align: center;
      padding: 15px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 15px;
    }
    .section {
      margin-top: 20px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<div class="container">

  <img src="img/earphone.jpeg" class="product-img">

  <h1>ワイヤレスイヤホン XYZ</h1>
  <p class="price">¥4,980（税込）</p>

  <a href="#" class="btn">カートに入れる</a>

  <div class="section">
    <h2>商品説明</h2>
    <p>
      高音質・軽量設計のワイヤレスイヤホン。<br>
      通勤・通学・リモートワークにも最適です。
    </p>
  </div>

  <div class="section">
    <h2>特徴</h2>
    <ul>
      <li>Bluetooth対応</li>
      <li>最大8時間再生</li>
      <li>ノイズキャンセリング機能</li>
    </ul>
  </div>

</div>

</body>
</html>
